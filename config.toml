enable-module-update = true # set this to false if you do not want to receive updates for the module
parallel-jobs = 1
patches-version = "latest"
cli-version = "latest"
cli-source = "MorpheApp/morphe-cli"

# add 'enabled = false' for not patching a specific app or remove it from the config
# see https://github.com/j-hc/revanced-magisk-module/blob/main/CONFIG.md for more detailed explanations

# you can use rvmm-config-gen to generate a config

[YouTube]
enabled = true
app-name = "YouTube"
build-mode = "apk"
arch = "arm64-v8a"
version = "auto"
patches-source = "MorpheApp/morphe-patches"
rv-brand = "Morphe"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube"
uptodown-dlurl = "https://youtube.en.uptodown.com/android"

[YT-Music]
enabled = false
app-name = "YT-Music"
build-mode = "apk"
arch = "arm64-v8a"
version = "auto"
patches-source = "MorpheApp/morphe-patches"
rv-brand = "Morphe"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/youtube-music"
uptodown-dlurl = "https://youtube-music.en.uptodown.com/android"

[Photos]
enabled = false
app-name = "Photos"
build-mode = "apk"
arch = "arm64-v8a"
version = "auto"
patches-source = "RookieEnough/De-Vanced"
rv-brand = "De-Vanced"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/google-inc/photos/"
uptodown-dlurl = "https://google-photos.en.uptodown.com/android"

[Twitter]
enabled = false
app-name = "Twitter"
build-mode = "module"
version = "11.81.0-release.0"
include-stock = "split"
patches-source = "crimera/piko"
rv-brand = "Piko"
apkmirror-dlurl = "https://www.apkmirror.com/apk/x-corp/twitter/"
archive-dlurl = "https://archive.org/download/jhc-apks/apks/com.twitter.android"

[Pinterest]
enabled = false
app-name = "Pinterest"
build-mode = "apk"
arch = "arm64-v8a"
version = "auto"
patches-source = "binarymend/morphe-patches"
rv-brand = "binarymend"
# apkmirror-dlurl = "https://www.apkmirror.com/apk/pinterest/"
uptodown-dlurl = "https://pinterest.en.uptodown.com/android"

[Inshorts]
enabled = true
app-name = "Inshorts"
build-mode = "apk"
arch = "arm64-v8a"
version = "auto"
patches-source = "RookieEnough/De-Vanced"
rv-brand = "De-Vanced"
uptodown-dlurl = "https://inshorts.en.uptodown.com/android"
